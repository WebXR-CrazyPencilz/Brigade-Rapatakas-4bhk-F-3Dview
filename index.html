<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interior 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e0f; font-family: 'Courier New', monospace; color: #c8c0b4; overflow: hidden; height: 100vh; }
    canvas { display: block; }
    #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 24px 32px; pointer-events: none; z-index: 10; }
    #title { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.55; }
    #badge { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.3; }
    #loader { position: fixed; inset: 0; background: #0e0e0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s ease; }
    #loader.fade { opacity: 0; pointer-events: none; }
    .bar-wrap { width: 180px; height: 1px; background: #2a2a2e; margin-top: 28px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: #c8b98a; transition: width 0.2s ease; }
    .load-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.4; margin-top: 14px; }
    #hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0; transition: opacity 1s ease 1s; pointer-events: none; z-index: 10; white-space: nowrap; }
    #hint.show { opacity: 0.25; }
  </style>
</head>
<body>

  <div id="hud">
    <div id="title">Interior · 3D View</div>
    <div id="badge">ArchViz</div>
  </div>

  <div id="loader">
    <div class="load-label">Loading model</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
    <div class="load-label" id="pct">0%</div>
  </div>

  <div id="hint">Left drag · orbit &nbsp;·&nbsp; Right drag · pan &nbsp;·&nbsp; Scroll · zoom</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    /* ── CONFIG ── */
    const MODEL_PATH = './4BHK.glb';
    const BG_COLOR   = 0x87CEEB;   // daylight sky blue
    /* ─────────── */

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 3.5;   // ← maximum brightness
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 100);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(4, 2.5, 5);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan     = true;
    controls.panSpeed      = 1.0;
    controls.minDistance   = 0.5;
    controls.maxDistance   = 40;
    controls.maxPolarAngle = Math.PI / 1.6;

    // ── LIGHTING ──

    // Bright white ambient — floods every room
    scene.add(new THREE.AmbientLight(0xffffff, 4.0));

    // Hemisphere — bright sky top, warm ground bounce
    scene.add(new THREE.HemisphereLight(0xffffff, 0xffe0a0, 3.0));

    // ☀️ SUN — high angle, intense, sharp shadows
    const sun = new THREE.DirectionalLight(0xfffde7, 8.0);
    sun.position.set(10, 30, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 0.1;
    sun.shadow.camera.far  = 100;
    sun.shadow.camera.left   = -25;
    sun.shadow.camera.right  =  25;
    sun.shadow.camera.top    =  25;
    sun.shadow.camera.bottom = -25;
    sun.shadow.bias = -0.0005;
    scene.add(sun);

    // Sun visible sphere in scene
    const sunMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.8, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xfffde7 })
    );
    sunMesh.position.set(10, 30, 10);
    scene.add(sunMesh);

    // Sun glow (larger, semi-transparent)
    const glowMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1.6, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.3 })
    );
    glowMesh.position.set(10, 30, 10);
    scene.add(glowMesh);

    // Fill lights — cover every corner of multi-room apartment
    const fills = [
      { pos: [0,  12,  0],  color: 0xffffff, intensity: 3.0 },  // top centre
      { pos: [0,  6,  14],  color: 0xfff8f0, intensity: 2.5 },  // front
      { pos: [0,  6, -14],  color: 0xfff8f0, intensity: 2.5 },  // back
      { pos: [-14, 6,  0],  color: 0xfff5e0, intensity: 2.5 },  // left
      { pos: [ 14, 6,  0],  color: 0xfff5e0, intensity: 2.5 },  // right
      { pos: [0,  -4,  0],  color: 0xffe8b0, intensity: 1.5 },  // floor bounce
      { pos: [-10, 10, 10], color: 0xffeedd, intensity: 2.0 },  // diagonal 1
      { pos: [ 10, 10,-10], color: 0xffeedd, intensity: 2.0 },  // diagonal 2
    ];

    fills.forEach(({ pos, color, intensity }) => {
      const light = new THREE.DirectionalLight(color, intensity);
      light.position.set(...pos);
      scene.add(light);
    });

    // ── Load model ──
    const barEl    = document.getElementById('bar');
    const pctEl    = document.getElementById('pct');
    const loaderEl = document.getElementById('loader');

    new THREE.GLTFLoader().load(
      MODEL_PATH,
      (gltf) => {
        const model = gltf.scene;

        model.traverse(node => {
          if (node.isMesh) {
            node.castShadow    = true;
            node.receiveShadow = true;
            if (node.material) {
              const mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(m => {
                if (m.emissive) m.emissive.set(0, 0, 0);
                m.needsUpdate = true;
              });
            }
          }
        });

        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 4 / maxDim;

        model.position.sub(center.multiplyScalar(scale));
        model.scale.setScalar(scale);
        scene.add(model);

        // Position sun relative to model size
        const s = scale;
        sun.position.set(10*s, 30*s, 10*s);
        sunMesh.position.set(10*s, 30*s, 10*s);
        glowMesh.position.set(10*s, 30*s, 10*s);

        controls.target.set(0, 0, 0);
        camera.position.set(5 * scale, 3 * scale, 6 * scale);
        controls.update();

        loaderEl.classList.add('fade');
        setTimeout(() => loaderEl.style.display = 'none', 900);
        document.getElementById('hint').classList.add('show');
      },
      (xhr) => {
        if (xhr.total) {
          const p = Math.round((xhr.loaded / xhr.total) * 100);
          barEl.style.width = p + '%';
          pctEl.textContent = p + '%';
        }
      },
      (err) => {
        pctEl.textContent = 'Error loading model';
        console.error('GLTF load error:', err);
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
