<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interior 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e0f; font-family: 'Courier New', monospace; color: #c8c0b4; overflow: hidden; height: 100vh; }
    canvas { display: block; }
    #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 24px 32px; pointer-events: none; z-index: 10; }
    #title { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.55; }
    #badge { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.3; }
    #loader { position: fixed; inset: 0; background: #0e0e0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s ease; }
    #loader.fade { opacity: 0; pointer-events: none; }
    .bar-wrap { width: 180px; height: 1px; background: #2a2a2e; margin-top: 28px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: #c8b98a; transition: width 0.2s ease; }
    .load-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.4; margin-top: 14px; }
    #hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0; transition: opacity 1s ease 1s; pointer-events: none; z-index: 10; white-space: nowrap; }
    #hint.show { opacity: 0.25; }
  </style>
</head>
<body>

  <div id="hud">
    <div id="title">Interior · 3D View</div>
    <div id="badge">ArchViz</div>
  </div>

  <div id="loader">
    <div class="load-label">Loading model</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
    <div class="load-label" id="pct">0%</div>
  </div>

  <div id="hint">Left drag · orbit &nbsp;·&nbsp; Right drag · pan &nbsp;·&nbsp; Scroll · zoom</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    /* ── CONFIG ── */
    const MODEL_PATH = './4BHK.glb';
    const BG_COLOR   = 0x0e0e0f;
    /* ─────────── */

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(4, 2.5, 5);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.enablePan      = true;
    controls.panSpeed       = 1.0;
    controls.minDistance    = 0.5;
    controls.maxDistance    = 40;
    controls.maxPolarAngle  = Math.PI / 1.6;

    // Lighting
    scene.add(new THREE.AmbientLight(0xfff5e6, 0.6));
    const key = new THREE.DirectionalLight(0xfff0d0, 1.8);
    key.position.set(5, 10, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.bias = -0.001;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xd0e8ff, 0.6);
    fill.position.set(-6, 4, -4);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffe8c0, 0.9);
    rim.position.set(0, -2, -8);
    scene.add(rim);
    scene.add(new THREE.HemisphereLight(0xfff5e0, 0x2a1a08, 0.5));

    // Load model
    const barEl    = document.getElementById('bar');
    const pctEl    = document.getElementById('pct');
    const loaderEl = document.getElementById('loader');

    new THREE.GLTFLoader().load(
      MODEL_PATH,
      (gltf) => {
        const model = gltf.scene;
        model.traverse(node => {
          if (node.isMesh) { node.castShadow = true; node.receiveShadow = true; }
        });
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 4 / maxDim;
        model.position.sub(center.multiplyScalar(scale));
        model.scale.setScalar(scale);
        scene.add(model);
        controls.target.set(0, 0, 0);
        camera.position.set(5 * scale, 3 * scale, 6 * scale);
        controls.update();
        loaderEl.classList.add('fade');
        setTimeout(() => loaderEl.style.display = 'none', 900);
        document.getElementById('hint').classList.add('show');
      },
      (xhr) => {
        if (xhr.total) {
          const p = Math.round((xhr.loaded / xhr.total) * 100);
          barEl.style.width = p + '%';
          pctEl.textContent = p + '%';
        }
      },
      (err) => {
        pctEl.textContent = 'Error loading model';
        console.error('GLTF load error:', err);
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
